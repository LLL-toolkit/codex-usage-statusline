name: build-release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: '0'
  CARGO_NET_GIT_FETCH_WITH_CLI: 'true'

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      project_version: ${{ steps.lock.outputs.project_version }}
      release_tag: ${{ steps.lock.outputs.release_tag }}
      codex_version: ${{ steps.lock.outputs.codex_version }}
      upstream_tag: ${{ steps.lock.outputs.upstream_tag }}
      upstream_tag_object: ${{ steps.lock.outputs.upstream_tag_object }}
      upstream_commit: ${{ steps.lock.outputs.upstream_commit }}
      upstream_tree: ${{ steps.lock.outputs.upstream_tree }}
      rust_toolchain: ${{ steps.lock.outputs.rust_toolchain }}
      patch_sha256: ${{ steps.lock.outputs.patch_sha256 }}
      patch_path: ${{ steps.lock.outputs.patch_path }}
      build_matrix: ${{ steps.lock.outputs.build_matrix }}
      customization_commit: ${{ steps.lock.outputs.customization_commit }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Validate release lock and tag
        id: lock
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then args+=(--tag "$GITHUB_REF_NAME"); fi
          python3 scripts/verify_release_lock.py "${args[@]}" --github-output "$GITHUB_OUTPUT"
          echo "customization_commit=$(git rev-parse HEAD)" >>"$GITHUB_OUTPUT"
      - name: Verify the immutable upstream tag
        shell: bash
        env:
          UPSTREAM_TAG: ${{ steps.lock.outputs.upstream_tag }}
          UPSTREAM_TAG_OBJECT: ${{ steps.lock.outputs.upstream_tag_object }}
          UPSTREAM_COMMIT: ${{ steps.lock.outputs.upstream_commit }}
          UPSTREAM_TREE: ${{ steps.lock.outputs.upstream_tree }}
        run: |
          set -euo pipefail
          refs=$(git ls-remote --tags https://github.com/openai/codex.git \
            "refs/tags/$UPSTREAM_TAG" "refs/tags/$UPSTREAM_TAG^{}")
          tag_object=$(printf '%s\n' "$refs" | awk '!/\^\{\}$/ {print $1}')
          peeled=$(printf '%s\n' "$refs" | awk '/\^\{\}$/ {print $1}')
          [[ "$tag_object" == "$UPSTREAM_TAG_OBJECT" ]]
          [[ "$peeled" == "$UPSTREAM_COMMIT" ]]
          git init "$RUNNER_TEMP/upstream-verify"
          git -C "$RUNNER_TEMP/upstream-verify" fetch --depth 1 https://github.com/openai/codex.git "$UPSTREAM_COMMIT"
          tree=$(git -C "$RUNNER_TEMP/upstream-verify" rev-parse 'FETCH_HEAD^{tree}')
          [[ "$tree" == "$UPSTREAM_TREE" ]]
      - name: Verify official npm platform publications
        shell: bash
        env:
          CODEX_VERSION: ${{ steps.lock.outputs.codex_version }}
        run: |
          set -euo pipefail
          npm view "@openai/codex@$CODEX_VERSION" version --json
          npm view "@openai/codex@$CODEX_VERSION-win32-x64" version --json
          npm view "@openai/codex@$CODEX_VERSION-darwin-arm64" version --json

  patch-tests:
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out locked upstream Codex at workspace root
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: openai/codex
          ref: ${{ needs.metadata.outputs.upstream_commit }}
          persist-credentials: false
      - name: Check out this customization
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: customization
          ref: ${{ needs.metadata.outputs.customization_commit }}
          persist-credentials: false
      - name: Apply and validate patch
        shell: bash
        run: |
          set -euo pipefail
          python3 customization/scripts/verify_release_lock.py
          git apply --check "customization/${{ needs.metadata.outputs.patch_path }}"
          git apply "customization/${{ needs.metadata.outputs.patch_path }}"
          git diff --check
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - name: Configure Codex rusty_v8 artifacts
        uses: ./.github/actions/setup-rusty-v8
        with:
          target: x86_64-unknown-linux-gnu
      - name: Run focused TUI tests
        working-directory: codex-rs
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target
        run: cargo test --locked -p codex-tui status_line_

  windows-installer-tests:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Windows PowerShell 5.1 helper tests
        shell: powershell
        run: .\tests\installer-helpers.tests.ps1
      - name: PowerShell 7 helper tests
        shell: pwsh
        run: .\tests\installer-helpers.tests.ps1

  macos-installer-tests:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Apple Silicon installer integration tests
        shell: bash
        run: ./tests/macos-installer.tests.sh

  build:
    needs: metadata
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.metadata.outputs.build_matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out locked upstream Codex at workspace root
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: openai/codex
          ref: ${{ needs.metadata.outputs.upstream_commit }}
          persist-credentials: false
      - name: Check out this customization
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: customization
          ref: ${{ needs.metadata.outputs.customization_commit }}
          persist-credentials: false
      - name: Apply locked customization patch
        shell: bash
        run: |
          set -euo pipefail
          python3 customization/scripts/verify_release_lock.py
          git apply --check "customization/${{ needs.metadata.outputs.patch_path }}"
          git apply "customization/${{ needs.metadata.outputs.patch_path }}"
          git diff --check
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.target }}
      - name: Configure MSVC environment
        if: matrix.os == 'windows'
        uses: ./.github/actions/setup-msvc-env
        with:
          target: ${{ matrix.target }}
      - name: Build customized Codex
        shell: bash
        working-directory: codex-rs
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          if [[ "$TARGET" == x86_64-pc-windows-msvc ]]; then
            export LIBSQLITE3_FLAGS=SQLITE_DISABLE_INTRINSIC
          fi
          cargo build --locked --release --target "$TARGET" -p codex-cli --bin codex
      - name: Strip and ad-hoc sign the Apple Silicon binary
        if: matrix.os == 'macos'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          EXECUTABLE: ${{ matrix.executable }}
        run: |
          set -euo pipefail
          target_root="$RUNNER_TEMP/cargo-target"
          if [[ "$RUNNER_OS" == Windows ]]; then target_root="$(cygpath -u "$RUNNER_TEMP")/cargo-target"; fi
          binary="$target_root/$TARGET/release/$EXECUTABLE"
          /usr/bin/strip -S "$binary"
          /usr/bin/codesign --force --sign - --timestamp=none "$binary"
          [[ "$(/usr/bin/lipo -archs "$binary")" == arm64 ]]
          /usr/bin/codesign --verify --deep --strict --verbose=2 "$binary"
          set +e
          /usr/sbin/spctl --assess --type execute --verbose=2 "$binary"
          gatekeeper_status=$?
          set -e
          echo "Gatekeeper assessment exit status: $gatekeeper_status"
      - name: Verify native release binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          EXECUTABLE: ${{ matrix.executable }}
          CODEX_VERSION: ${{ needs.metadata.outputs.codex_version }}
        run: |
          set -euo pipefail
          target_root="$RUNNER_TEMP/cargo-target"
          if [[ "$RUNNER_OS" == Windows ]]; then target_root="$(cygpath -u "$RUNNER_TEMP")/cargo-target"; fi
          binary="$target_root/$TARGET/release/$EXECUTABLE"
          [[ -f "$binary" ]]
          version=$("$binary" --version)
          [[ "$version" == *"$CODEX_VERSION"* ]]
      - name: Package deterministic release candidate
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          EXECUTABLE: ${{ matrix.executable }}
          TARGET_OS: ${{ matrix.os }}
        run: |
          set -euo pipefail
          target_root="$RUNNER_TEMP/cargo-target"
          if [[ "$RUNNER_OS" == Windows ]]; then target_root="$(cygpath -u "$RUNNER_TEMP")/cargo-target"; fi
          binary="$target_root/$TARGET/release/$EXECUTABLE"
          debug_stripped=false
          if [[ "$TARGET_OS" == macos ]]; then debug_stripped=true; fi
          python3 customization/scripts/release_assets.py package \
            --lock customization/release-lock.json \
            --target "$TARGET" \
            --binary "$binary" \
            --dist customization/dist \
            --customization-commit "${{ needs.metadata.outputs.customization_commit }}" \
            --debug-symbols-stripped "$debug_stripped"
      - name: Upload release candidate
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-${{ matrix.target }}
          path: customization/dist/*
          if-no-files-found: error

  assemble:
    needs: [metadata, patch-tests, windows-installer-tests, macos-installer-tests, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.metadata.outputs.customization_commit }}
          persist-credentials: false
      - name: Download all release candidates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Assemble and independently verify the release bundle
        shell: bash
        env:
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          [[ -n "$RELEASE_SIGNING_PRIVATE_KEY" ]]
          signing_key="$RUNNER_TEMP/release-signing-private.pem"
          printf '%s\n' "$RELEASE_SIGNING_PRIVATE_KEY" >"$signing_key"
          chmod 600 "$signing_key"
          python3 scripts/release_assets.py assemble \
            --lock release-lock.json --dist dist --signing-key "$signing_key" \
            --customization-commit "${{ needs.metadata.outputs.customization_commit }}"
          rm -f "$signing_key"
          python3 scripts/release_assets.py verify --lock release-lock.json --release-dir dist \
            --expected-customization-commit "${{ needs.metadata.outputs.customization_commit }}"
      - name: Upload complete release bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-bundle
          path: dist/*
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [metadata, assemble]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.metadata.outputs.customization_commit }}
          persist-credentials: false
      - name: Download verified release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-bundle
          path: dist
      - name: Publish immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
          PROJECT_VERSION: ${{ needs.metadata.outputs.project_version }}
          CODEX_VERSION: ${{ needs.metadata.outputs.codex_version }}
        shell: bash
        run: |
          set -euo pipefail
          validate_published_release() {
            destination=$1
            mkdir -p "$destination"
            gh release download "$RELEASE_TAG" --dir "$destination"
            python3 scripts/release_assets.py verify \
              --lock release-lock.json --release-dir "$destination" \
              --expected-customization-commit "${{ needs.metadata.outputs.customization_commit }}"
          }

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            is_draft=$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)
            if [[ "$is_draft" == false ]]; then
              validate_published_release "$RUNNER_TEMP/existing-release"
              echo "Published release $RELEASE_TAG is complete and independently verified."
              exit 0
            fi
          else
            gh release create "$RELEASE_TAG" --verify-tag --draft --prerelease \
              --title "codex-usage-statusline $PROJECT_VERSION for Codex $CODEX_VERSION" \
              --notes 'Prebuilt side-by-side status-line binaries for Windows x64 and Apple Silicon macOS. The macOS binary is ad-hoc signed and hash-verified, but it has no Apple Developer ID signature or notarization; Gatekeeper can reject quarantined copies. Use the repository installer described in README.md.'
          fi

          gh release upload "$RELEASE_TAG" dist/* --clobber
          uploaded="$RUNNER_TEMP/uploaded-release"
          validate_published_release "$uploaded"
          cmp dist/SHA256SUMS "$uploaded/SHA256SUMS"
          gh release edit "$RELEASE_TAG" --draft=false --prerelease --latest=false

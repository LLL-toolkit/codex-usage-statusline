name: build-release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: '0'
  CARGO_NET_GIT_FETCH_WITH_CLI: 'true'

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      project_version: ${{ steps.lock.outputs.project_version }}
      release_tag: ${{ steps.lock.outputs.release_tag }}
      codex_version: ${{ steps.lock.outputs.codex_version }}
      upstream_tag: ${{ steps.lock.outputs.upstream_tag }}
      upstream_tag_object: ${{ steps.lock.outputs.upstream_tag_object }}
      upstream_commit: ${{ steps.lock.outputs.upstream_commit }}
      upstream_tree: ${{ steps.lock.outputs.upstream_tree }}
      rust_toolchain: ${{ steps.lock.outputs.rust_toolchain }}
      patch_sha256: ${{ steps.lock.outputs.patch_sha256 }}
      patch_path: ${{ steps.lock.outputs.patch_path }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Validate release lock and tag
        id: lock
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then args+=(--tag "$GITHUB_REF_NAME"); fi
          python3 scripts/verify_release_lock.py "${args[@]}" --github-output "$GITHUB_OUTPUT"
      - name: Verify the immutable upstream tag
        shell: bash
        env:
          UPSTREAM_TAG: ${{ steps.lock.outputs.upstream_tag }}
          UPSTREAM_TAG_OBJECT: ${{ steps.lock.outputs.upstream_tag_object }}
          UPSTREAM_COMMIT: ${{ steps.lock.outputs.upstream_commit }}
          UPSTREAM_TREE: ${{ steps.lock.outputs.upstream_tree }}
        run: |
          set -euo pipefail
          refs=$(git ls-remote --tags https://github.com/openai/codex.git \
            "refs/tags/$UPSTREAM_TAG" "refs/tags/$UPSTREAM_TAG^{}")
          tag_object=$(printf '%s\n' "$refs" | awk '!/\^\{\}$/ {print $1}')
          peeled=$(printf '%s\n' "$refs" | awk '/\^\{\}$/ {print $1}')
          [[ "$tag_object" == "$UPSTREAM_TAG_OBJECT" ]]
          [[ "$peeled" == "$UPSTREAM_COMMIT" ]]
          git init "$RUNNER_TEMP/upstream-verify"
          git -C "$RUNNER_TEMP/upstream-verify" fetch --depth 1 https://github.com/openai/codex.git "$UPSTREAM_COMMIT"
          tree=$(git -C "$RUNNER_TEMP/upstream-verify" rev-parse 'FETCH_HEAD^{tree}')
          [[ "$tree" == "$UPSTREAM_TREE" ]]
      - name: Verify official npm platform publications
        shell: bash
        env:
          CODEX_VERSION: ${{ steps.lock.outputs.codex_version }}
        run: |
          set -euo pipefail
          npm view "@openai/codex@$CODEX_VERSION" version --json
          npm view "@openai/codex@$CODEX_VERSION-win32-x64" version --json

  patch-tests:
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out locked upstream Codex at workspace root
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: openai/codex
          ref: ${{ needs.metadata.outputs.upstream_commit }}
          persist-credentials: false
      - name: Check out this customization
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: customization
          persist-credentials: false
      - name: Apply and validate patch
        shell: bash
        run: |
          set -euo pipefail
          python3 customization/scripts/verify_release_lock.py
          git apply --check "customization/${{ needs.metadata.outputs.patch_path }}"
          git apply "customization/${{ needs.metadata.outputs.patch_path }}"
          git diff --check
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - name: Configure Codex rusty_v8 artifacts
        uses: ./.github/actions/setup-rusty-v8
        with:
          target: x86_64-unknown-linux-gnu
      - name: Run focused TUI tests
        working-directory: codex-rs
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target
        run: cargo test --locked -p codex-tui status_line_

  build:
    needs: [metadata, patch-tests]
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            executable: codex.exe
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out locked upstream Codex at workspace root
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: openai/codex
          ref: ${{ needs.metadata.outputs.upstream_commit }}
          persist-credentials: false
      - name: Check out this customization
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: customization
          persist-credentials: false
      - name: Apply locked customization patch
        shell: bash
        run: |
          set -euo pipefail
          python3 customization/scripts/verify_release_lock.py
          git apply --check "customization/${{ needs.metadata.outputs.patch_path }}"
          git apply "customization/${{ needs.metadata.outputs.patch_path }}"
          git diff --check
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.target }}
      - name: Configure MSVC environment
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-msvc-env
        with:
          target: ${{ matrix.target }}
      - name: Build customized Codex
        shell: bash
        working-directory: codex-rs
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          if [[ "$TARGET" == x86_64-pc-windows-msvc ]]; then
            export LIBSQLITE3_FLAGS=SQLITE_DISABLE_INTRINSIC
          fi
          cargo build --locked --release --target "$TARGET" -p codex-cli --bin codex
      - name: Verify native release binary
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          EXECUTABLE: ${{ matrix.executable }}
          CODEX_VERSION: ${{ needs.metadata.outputs.codex_version }}
        run: |
          $ErrorActionPreference = 'Stop'
          $binary = Join-Path $env:RUNNER_TEMP "cargo-target/$env:TARGET/release/$env:EXECUTABLE"
          if (-not (Test-Path -LiteralPath $binary -PathType Leaf)) { throw "Missing release binary: $binary" }
          $version = (& $binary --version | Out-String).Trim()
          if ($LASTEXITCODE -ne 0 -or -not $version.Contains($env:CODEX_VERSION)) {
            throw "Unexpected release binary version: $version"
          }
      - name: Package release asset
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          EXECUTABLE: ${{ matrix.executable }}
          ARCHIVE_KIND: ${{ matrix.archive }}
          PROJECT_VERSION: ${{ needs.metadata.outputs.project_version }}
          CODEX_VERSION: ${{ needs.metadata.outputs.codex_version }}
          UPSTREAM_TAG: ${{ needs.metadata.outputs.upstream_tag }}
          UPSTREAM_COMMIT: ${{ needs.metadata.outputs.upstream_commit }}
          UPSTREAM_TREE: ${{ needs.metadata.outputs.upstream_tree }}
          RUST_TOOLCHAIN: ${{ needs.metadata.outputs.rust_toolchain }}
          PATCH_SHA256: ${{ needs.metadata.outputs.patch_sha256 }}
        run: |
          $ErrorActionPreference = 'Stop'
          $stage = Join-Path $env:RUNNER_TEMP 'release-stage'
          $dist = Join-Path $env:GITHUB_WORKSPACE 'customization/dist'
          New-Item -ItemType Directory -Force -Path $stage, $dist | Out-Null
          $binary = Join-Path $env:RUNNER_TEMP "cargo-target/$env:TARGET/release/$env:EXECUTABLE"
          Copy-Item -LiteralPath $binary -Destination (Join-Path $stage $env:EXECUTABLE)
          Copy-Item -LiteralPath 'customization/LICENSE' -Destination (Join-Path $stage 'LICENSE')
          Copy-Item -LiteralPath 'customization/NOTICE.md' -Destination (Join-Path $stage 'NOTICE.md')
          $binaryHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $binary).Hash.ToLowerInvariant()
          $metadata = [ordered]@{
            schemaVersion = 1; projectVersion = $env:PROJECT_VERSION; codexVersion = $env:CODEX_VERSION
            upstreamTag = $env:UPSTREAM_TAG; upstreamCommit = $env:UPSTREAM_COMMIT; upstreamTree = $env:UPSTREAM_TREE
            rustToolchain = $env:RUST_TOOLCHAIN; patchSha256 = $env:PATCH_SHA256
            customizationCommit = $env:GITHUB_SHA; target = $env:TARGET; binarySha256 = $binaryHash
          }
          $metadataPath = Join-Path $stage 'BUILD-METADATA.json'
          [IO.File]::WriteAllText($metadataPath, ($metadata | ConvertTo-Json), (New-Object Text.UTF8Encoding($false)))
          $assetBase = "codex-usage-statusline-$env:PROJECT_VERSION-codex-$env:CODEX_VERSION-$env:TARGET"
          if ($env:ARCHIVE_KIND -ne 'zip') { throw "Unsupported Windows archive kind: $env:ARCHIVE_KIND" }
          $asset = Join-Path $dist "$assetBase.zip"
          Compress-Archive -Path (Join-Path $stage '*') -DestinationPath $asset -CompressionLevel Optimal
          $archiveHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $asset).Hash.ToLowerInvariant()
          [IO.File]::WriteAllText("$asset.sha256", "$archiveHash  $([IO.Path]::GetFileName($asset))`n", (New-Object Text.UTF8Encoding($false)))
          Copy-Item -LiteralPath $metadataPath -Destination (Join-Path $dist "$assetBase.metadata.json")
      - name: Upload release candidate
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-${{ matrix.target }}
          path: customization/dist/*
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [metadata, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download all release candidates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Generate release manifest and aggregate checksums
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib, json
          from pathlib import Path

          def sha256_file(path):
              digest = hashlib.sha256()
              with path.open('rb') as stream:
                  for chunk in iter(lambda: stream.read(1024 * 1024), b''):
                      digest.update(chunk)
              return digest.hexdigest()

          dist = Path('dist')
          metadata = [json.loads(path.read_text()) for path in sorted(dist.glob('*.metadata.json'))]
          expected_targets = {target['triple'] for target in json.loads(Path('release-lock.json').read_text())['targets']}
          actual_targets = {entry['target'] for entry in metadata}
          if actual_targets != expected_targets or len(metadata) != len(expected_targets):
              raise SystemExit(f'target metadata mismatch: expected {expected_targets}, got {actual_targets}')
          assets = []
          for entry in metadata:
              base = f"codex-usage-statusline-{entry['projectVersion']}-codex-{entry['codexVersion']}-{entry['target']}"
              matches = list(dist.glob(base + '.zip'))
              if len(matches) != 1:
                  raise SystemExit(f'expected one archive for {base}, found {matches}')
              path = matches[0]
              entry['asset'] = path.name
              entry['archiveSha256'] = sha256_file(path)
              assets.append(entry)
          lock = json.loads(Path('release-lock.json').read_text())
          manifest = {
              'schemaVersion': 1,
              'projectVersion': lock['projectVersion'],
              'codexVersion': lock['codexVersion'],
              'upstreamTag': lock['upstreamTag'],
              'upstreamCommit': lock['upstreamCommit'],
              'patchSha256': lock['patch']['sha256'],
              'assets': assets,
          }
          (dist / 'release-manifest.json').write_text(json.dumps(manifest, indent=2) + '\n')
          checksum_paths = sorted(p for p in dist.iterdir() if p.is_file())
          with (dist / 'SHA256SUMS').open('w') as output:
              for path in checksum_paths:
                  output.write(f"{sha256_file(path)}  {path.name}\n")
          PY
      - name: Publish immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
          PROJECT_VERSION: ${{ needs.metadata.outputs.project_version }}
          CODEX_VERSION: ${{ needs.metadata.outputs.codex_version }}
        shell: bash
        run: |
          set -euo pipefail
          validate_published_release() {
            local destination=$1
            mkdir -p "$destination"
            gh release download "$RELEASE_TAG" --dir "$destination"
            (cd "$destination" && sha256sum -c SHA256SUMS)
            EXISTING_RELEASE="$destination" python3 - <<'PY'
          import hashlib, json, os, re
          from pathlib import Path

          def sha256_file(path):
              digest = hashlib.sha256()
              with path.open('rb') as stream:
                  for chunk in iter(lambda: stream.read(1024 * 1024), b''):
                      digest.update(chunk)
              return digest.hexdigest()

          root = Path(os.environ['EXISTING_RELEASE'])
          lock = json.loads(Path('release-lock.json').read_text())
          target = lock['targets'][0]['triple']
          base = f"codex-usage-statusline-{lock['projectVersion']}-codex-{lock['codexVersion']}-{target}"
          expected_names = {
              f'{base}.zip', f'{base}.zip.sha256', f'{base}.metadata.json',
              'release-manifest.json', 'SHA256SUMS',
          }
          actual_names = {path.name for path in root.iterdir() if path.is_file()}
          if actual_names != expected_names:
              raise SystemExit(f'published asset set mismatch: expected {expected_names}, got {actual_names}')

          archive = root / f'{base}.zip'
          sidecar = (root / f'{base}.zip.sha256').read_text().strip()
          match = re.fullmatch(r'([0-9a-f]{64})  ([^\s]+)', sidecar)
          archive_hash = sha256_file(archive)
          if not match or match.group(1) != archive_hash or match.group(2) != archive.name:
              raise SystemExit('published archive sidecar is invalid')

          metadata = json.loads((root / f'{base}.metadata.json').read_text())
          manifest = json.loads((root / 'release-manifest.json').read_text())
          if (manifest.get('projectVersion') != lock['projectVersion'] or
              manifest.get('codexVersion') != lock['codexVersion'] or
              manifest.get('upstreamTag') != lock['upstreamTag'] or
              manifest.get('upstreamCommit') != lock['upstreamCommit'] or
              manifest.get('patchSha256') != lock['patch']['sha256']):
              raise SystemExit('published release manifest does not match release-lock.json')
          assets = manifest.get('assets', [])
          if len(assets) != 1 or assets[0].get('target') != target:
              raise SystemExit('published release manifest target set is invalid')
          if assets[0].get('asset') != archive.name or assets[0].get('archiveSha256') != archive_hash:
              raise SystemExit('published release manifest archive record is invalid')
          for key, value in metadata.items():
              if assets[0].get(key) != value:
                  raise SystemExit(f'published metadata mismatch for {key}')
          PY
          }

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            is_draft=$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)
            if [[ "$is_draft" == false ]]; then
              validate_published_release "$RUNNER_TEMP/existing-release"
              echo "Published release $RELEASE_TAG is complete and independently verified."
              exit 0
            fi
          else
            gh release create "$RELEASE_TAG" --verify-tag --draft \
              --title "codex-usage-statusline $PROJECT_VERSION for Codex $CODEX_VERSION" \
              --notes "Prebuilt side-by-side status-line binary for Windows x64. Apple Silicon continuation steps are documented for a later Mac-based implementation. See README.md before installing."
          fi

          gh release upload "$RELEASE_TAG" dist/* --clobber
          uploaded="$RUNNER_TEMP/uploaded-release"
          mkdir -p "$uploaded"
          gh release download "$RELEASE_TAG" --dir "$uploaded"
          cmp dist/SHA256SUMS "$uploaded/SHA256SUMS"
          (cd "$uploaded" && sha256sum -c SHA256SUMS)
          gh release edit "$RELEASE_TAG" --draft=false
